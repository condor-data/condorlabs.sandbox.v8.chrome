###############################################################################
# Build d8 — V8 Sandbox Escape Lab
#
# Matrix strategy: builda multiplos configs EM PARALELO.
# Cada config roda no seu proprio runner (gratuito para public repos).
#
# Exemplos de dispatch:
#   1 config:   gh workflow run build-d8.yml -f configs='["fast"]'
#   4 paralelo: gh workflow run build-d8.yml -f configs='["fast","fuzz","asan","tsan"]'
#   tudo:       gh workflow run build-d8.yml -f configs='["fast","fuzz","asan","tsan"]' -f v8_version=14.7.173.18
#
# Pipeline por config: pre-validate → setup-v8 → build → post-validate
# Tudo YAML-driven. Nada hardcoded. ZERO secrets. ZERO custo.
###############################################################################
name: "Build d8 (V8 Sandbox Escape Lab)"

on:
  workflow_dispatch:
    inputs:
      v8_version:
        description: "V8 version (ex: 14.7.173.18). Vazio = auto-detect."
        required: false
        default: ""
        type: string
      configs:
        description: 'Configs JSON array (ex: ["fast"] ou ["fast","fuzz","asan","tsan"])'
        required: true
        default: '["fast"]'
        type: string


permissions:
  contents: write

# ==============================================================================
# JOB 1: Detect version + build matrix
# ==============================================================================
jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      v8_version: ${{ steps.version.outputs.V8_VERSION }}
      v8_branch: ${{ steps.version.outputs.V8_BRANCH }}
      matrix: ${{ steps.matrix.outputs.MATRIX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect V8 version
        id: version
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.v8_version }}" ]; then
            V8_VER="${{ inputs.v8_version }}"
            echo "::notice::OVERRIDE MANUAL: V8 ${V8_VER}"
          else
            RESPONSE=$(curl -s --max-time 30 'https://chromiumdash.appspot.com/fetch_milestones')
            if [ -z "$RESPONSE" ]; then
              echo "::error::!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
              echo "::error::chromiumdash.appspot.com retornou RESPOSTA VAZIA!"
              echo "::error::SOLUCAO: re-dispare com v8_version preenchido:"
              echo "::error::  gh workflow run build-d8.yml -f configs='[\"fast\"]' -f v8_version=14.7.173.18"
              echo "::error::!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
              exit 1
            fi

            STABLE_BRANCH=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for m in data:
              if m.get('schedule_phase') == 'stable' and m.get('schedule_active'):
                  print(m['v8_branch'])
                  break
          ") || {
              echo "::error::JSON parse FALHOU! Resposta: $(echo "$RESPONSE" | head -c 200)"
              exit 1
            }

            [ -z "$STABLE_BRANCH" ] && { echo "::error::Branch estavel vazio!"; exit 1; }

            V8_VER=$(git ls-remote --tags https://chromium.googlesource.com/v8/v8.git "${STABLE_BRANCH}.*" | \
              awk '{print $2}' | sed 's|refs/tags/||' | sort -V | tail -1)

            [ -z "$V8_VER" ] && { echo "::error::Nenhuma tag para ${STABLE_BRANCH}!"; exit 1; }
            echo "::notice::Auto-detected: V8 ${V8_VER}"
          fi

          V8_BRANCH="branch-heads/$(echo $V8_VER | cut -d. -f1,2)"
          echo "V8_VERSION=${V8_VER}" >> $GITHUB_OUTPUT
          echo "V8_BRANCH=${V8_BRANCH}" >> $GITHUB_OUTPUT

      - name: Build matrix
        id: matrix
        run: |
          set -euo pipefail
          pip3 -q install pyyaml

          python3 << 'PYEOF'
          import json, os, yaml

          configs = json.loads('${{ inputs.configs }}')

          # Validar que cada config existe no YAML
          with open('configs/v8-chrome.yaml') as f:
              cfg = yaml.safe_load(f)
          available = set(cfg.get('configs', {}).keys())

          for c in configs:
              if c not in available:
                  print(f"::error::Config '{c}' NAO EXISTE no YAML! Disponiveis: {sorted(available)}")
                  raise SystemExit(1)

          # Gerar matrix (x64 only)
          include = [{"config": c} for c in configs]
          matrix = {"include": include}
          print(f"::notice::Matrix: {len(include)} jobs — {configs}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"MATRIX={json.dumps(matrix)}\n")
          PYEOF

  # ==============================================================================
  # JOB 2: Build (paralelo, 1 runner por config x platform)
  # ==============================================================================
  build:
    needs: prepare
    strategy:
      fail-fast: false  # um config falhando NAO cancela os outros
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # PHASE 1: PRE-VALIDATE
      - name: "Phase 1: Pre-validate (${{ matrix.config }})"
        uses: ./.github/actions/pre-validate
        with:
          yaml_file: configs/v8-chrome.yaml
          config: ${{ matrix.config }}

      # PHASE 2: SETUP V8
      - name: "Phase 2: Setup V8"
        uses: ./.github/actions/setup-v8
        with:
          v8_version: ${{ needs.prepare.outputs.v8_version }}
          v8_branch: ${{ needs.prepare.outputs.v8_branch }}
          config: ${{ matrix.config }}

      # PHASE 3: BUILD
      # NOTA: args.gn é gerado AQUI (dentro do build-d8), NÃO no pre-validate.
      # O setup-v8 faz rm -rf v8 em clone fresh, destruindo qualquer args.gn
      # criado antes dele. Por isso o build-d8 recebe yaml_file e regenera.
      - name: "Phase 3: Build d8"
        id: build
        uses: ./.github/actions/build-d8
        with:
          config: ${{ matrix.config }}
          yaml_file: configs/v8-chrome.yaml

      # PHASE 4: POST-VALIDATE
      - name: "Phase 4: Post-validate"
        if: always() && !cancelled()
        uses: ./.github/actions/post-validate
        with:
          yaml_file: configs/v8-chrome.yaml
          config: ${{ matrix.config }}
          v8_version: ${{ needs.prepare.outputs.v8_version }}
          build_result: ${{ steps.build.outcome }}
