###############################################################################
# Build d8 — V8 Sandbox Escape Lab
#
# Pipeline: 4 fases (composite actions no mesmo runner)
#   Phase 1: pre-validate   — YAML validate + args.gn gen + verify (~30s)
#   Phase 2: setup-v8       — deps + cache + fetch V8 (~10min)
#   Phase 3: build-d8       — gn gen + autoninja (~15min)
#   Phase 4: post-validate  — test + introspect + artifacts + status (~60s)
#
# Tudo lido do YAML. Nada hardcoded. YAML eh a unica fonte de verdade.
# Trigger: APENAS manual. Secrets: ZERO. Custo: $0.
###############################################################################
name: "Build d8 (V8 Sandbox Escape Lab)"

on:
  workflow_dispatch:
    inputs:
      v8_version:
        description: "V8 version override (ex: 14.7.173.18). Vazio = auto-detect Chrome stable."
        required: false
        default: ""
        type: string
      v8_config:
        description: "Build config (do configs/v8-chrome.yaml)"
        required: true
        default: "fast"
        type: choice
        options:
          - fast
          - fuzz
          - debug
          - release
          - asan
          - tsan
          - ubsan

permissions:
  contents: write  # necessario para git push do status update

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ==================================================================
      # CHECKOUT + VERSION DETECT
      # ==================================================================
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect V8 version
        id: version
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.v8_version }}" ]; then
            V8_VER="${{ inputs.v8_version }}"
            echo "::notice::OVERRIDE MANUAL: V8 ${V8_VER}"
          else
            STABLE_BRANCH=$(curl -sf --max-time 15 'https://chromiumdash.appspot.com/fetch_milestones' | \
              python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for m in data:
              if m.get('schedule_phase') == 'stable' and m.get('schedule_active'):
                  print(m['v8_branch'])
                  break
          ") || { echo "::error::FALHA ao detectar V8 branch!"; exit 1; }

            [ -z "$STABLE_BRANCH" ] && { echo "::error::Branch vazio!"; exit 1; }

            V8_VER=$(git ls-remote --tags https://chromium.googlesource.com/v8/v8.git "${STABLE_BRANCH}.*" | \
              awk '{print $2}' | sed 's|refs/tags/||' | sort -V | tail -1) || \
              { echo "::error::git ls-remote FALHOU!"; exit 1; }

            [ -z "$V8_VER" ] && { echo "::error::Nenhuma tag para ${STABLE_BRANCH}!"; exit 1; }
            echo "::notice::Auto-detected: V8 ${V8_VER}"
          fi

          V8_BRANCH="branch-heads/$(echo $V8_VER | cut -d. -f1,2)"
          echo "V8_VERSION=${V8_VER}" >> $GITHUB_OUTPUT
          echo "V8_BRANCH=${V8_BRANCH}" >> $GITHUB_OUTPUT

      # ==================================================================
      # PHASE 1: PRE-VALIDATE
      # ==================================================================
      - name: "Phase 1: Pre-validate"
        uses: ./.github/actions/pre-validate
        with:
          yaml_file: configs/v8-chrome.yaml
          config: ${{ inputs.v8_config }}

      # ==================================================================
      # PHASE 2: SETUP V8
      # ==================================================================
      - name: "Phase 2: Setup V8"
        uses: ./.github/actions/setup-v8
        with:
          v8_version: ${{ steps.version.outputs.V8_VERSION }}
          v8_branch: ${{ steps.version.outputs.V8_BRANCH }}
          config: ${{ inputs.v8_config }}

      # ==================================================================
      # PHASE 3: BUILD
      # ==================================================================
      - name: "Phase 3: Build d8"
        id: build
        uses: ./.github/actions/build-d8
        with:
          config: ${{ inputs.v8_config }}

      # ==================================================================
      # PHASE 4: POST-VALIDATE
      # ==================================================================
      - name: "Phase 4: Post-validate"
        if: always() && !cancelled()
        uses: ./.github/actions/post-validate
        with:
          yaml_file: configs/v8-chrome.yaml
          config: ${{ inputs.v8_config }}
          v8_version: ${{ steps.version.outputs.V8_VERSION }}
          build_result: ${{ steps.build.outcome }}
